name: build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8
        run: flake8 .
  test:
    runs-on: self-hosted

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: python manage.py test
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        CI: true
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  build-and-deploy:
    runs-on: self-hosted
    needs: test
    steps:

      - name: Force cleanup Python cache and fix permissions
        run: |
          sudo rm -rf __pycache__ || true
          sudo chown -R $(whoami):$(whoami) .

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Debug user and permissions
        run: |
          echo "==== Debug Info ===="
          whoami
          id
          groups
          ls -l /var/run/docker.sock
          docker ps || echo "Docker access failed"
          docker compose version || echo "Compose failed"

      - name: Create .env from secret
        run: |
          echo "==== Generating .env ===="
          cat << 'EOF' > .env
          ${{ secrets.DOTENV }}
          EOF
          ls -la .env

      - name: Build & Up Docker Compose
        run: |
          echo "==== Docker Compose Build & Up ===="
          docker compose down --remove-orphans
          docker compose build --no-cache
          docker compose --env-file .env -f docker-compose.yml up -d
          docker compose ps

      - name: Cleanup old Docker data
        if: always()
        run: |
          echo "==== Cleaning up unused Docker images and cache ===="
          docker image prune -f
